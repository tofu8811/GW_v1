services:
  postgres:
    image: postgres:16
    container_name: gateway-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gateway_db}
      POSTGRES_USER: ${POSTGRES_USER:-gateway_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gateway_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: gateway-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    volumes:
      - gateway_pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7
    container_name: gateway-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - gateway_redis_data:/data

volumes:
  gateway_postgres_data:
  gateway_pgadmin_data:
  gateway_redis_data:
